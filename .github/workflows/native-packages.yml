name: Native OpenBench packages

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  # Keep this pinned so release builds are reproducible. Windows is distributed
  # as a self-extracting archive; Linux and macOS use tarballs.
  OSS_CAD_TAG: 2026-05-12

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            suite: windows-x64
            signed_package_args: --win nsis --x64 --config.forceCodeSigning=true
            unsigned_package_args: --win nsis --x64 --config.forceCodeSigning=false
            artifact: OpenBench-Windows-x64
          - os: ubuntu-22.04
            suite: linux-x64
            signed_package_args: --linux deb tar.gz
            unsigned_package_args: --linux deb tar.gz
            artifact: OpenBench-Linux-x64
          - os: macos-14
            suite: darwin-arm64
            signed_package_args: --mac dmg zip --arm64 --config.forceCodeSigning=true
            unsigned_package_args: --mac dmg zip --arm64 --config.mac.identity=null --config.mac.hardenedRuntime=false --config.mac.notarize=false
            artifact: OpenBench-macOS-arm64
    runs-on: ${{ matrix.os }}
    env:
      WIN_CSC_LINK: ${{ matrix.os == 'windows-2022' && secrets.WINDOWS_CSC_LINK || '' }}
      WIN_CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-2022' && secrets.WINDOWS_CSC_KEY_PASSWORD || '' }}
      LINUX_GPG_PRIVATE_KEY: ${{ matrix.os == 'ubuntu-22.04' && secrets.LINUX_GPG_PRIVATE_KEY || '' }}
      LINUX_GPG_PASSPHRASE: ${{ matrix.os == 'ubuntu-22.04' && secrets.LINUX_GPG_PASSPHRASE || '' }}
      LINUX_GPG_KEY_ID: ${{ matrix.os == 'ubuntu-22.04' && secrets.LINUX_GPG_KEY_ID || '' }}
      CSC_LINK: ${{ matrix.os == 'macos-14' && secrets.MACOS_CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-14' && secrets.MACOS_CSC_KEY_PASSWORD || '' }}
      APPLE_ID: ${{ matrix.os == 'macos-14' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-14' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.os == 'macos-14' && secrets.APPLE_TEAM_ID || '' }}
      OPENBENCH_SIGNING_READY: ${{ (matrix.os == 'windows-2022' && secrets.WINDOWS_CSC_LINK != '' && secrets.WINDOWS_CSC_KEY_PASSWORD != '') || (matrix.os == 'ubuntu-22.04' && secrets.LINUX_GPG_PRIVATE_KEY != '' && secrets.LINUX_GPG_PASSPHRASE != '') || (matrix.os == 'macos-14' && secrets.MACOS_CSC_LINK != '' && secrets.MACOS_CSC_KEY_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '') }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Download official native OSS CAD Suite
        shell: bash
        run: |
          archive_date="${OSS_CAD_TAG//-/}"
          extension="tgz"
          if [[ "${{ runner.os }}" == "Windows" ]]; then extension="exe"; fi
          archive="oss-cad-suite-${{ matrix.suite }}-${archive_date}.${extension}"
          curl --fail --location --retry 3 "https://github.com/YosysHQ/oss-cad-suite-build/releases/download/${OSS_CAD_TAG}/${archive}" --output "${archive}"
          mkdir -p ../.toolchain
          if [[ "${extension}" == "exe" ]]; then
            7z x "${archive}" -o../.toolchain -y
          else
            tar -xzf "${archive}" -C ../.toolchain
          fi
      - run: pnpm install --frozen-lockfile
      - name: Install and update ClamAV
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes clamav
          sudo systemctl stop clamav-freshclam.service || true
          sudo freshclam
      - run: pnpm build
      - name: Stage bundled native backends
        env:
          OPENBENCH_TOOLCHAIN_SOURCE: ${{ github.workspace }}/.toolchain/oss-cad-suite
        run: pnpm toolchain:stage
      - name: Require Authenticode credentials for Windows
        if: runner.os == 'Windows' && env.OPENBENCH_SIGNING_READY == 'true'
        run: node scripts/require-windows-signing.cjs
      - name: Require Linux release-signing credentials
        if: runner.os == 'Linux' && env.OPENBENCH_SIGNING_READY == 'true'
        run: node scripts/require-release-signing.cjs linux
      - name: Require macOS signing and notarization credentials
        if: runner.os == 'macOS' && env.OPENBENCH_SIGNING_READY == 'true'
        run: node scripts/require-release-signing.cjs mac
      - name: Report unsigned preview build
        if: env.OPENBENCH_SIGNING_READY != 'true'
        run: echo "::warning::Signing credentials are not configured; producing an explicitly unsigned preview artifact."
      - name: Run native real-backend regression
        run: pnpm test
      - name: Build unpacked native app
        shell: bash
        run: |
          if [[ "${OPENBENCH_SIGNING_READY}" == "true" ]]; then
            pnpm exec electron-builder ${{ matrix.signed_package_args }} --dir
          else
            pnpm exec electron-builder ${{ matrix.unsigned_package_args }} --dir
          fi
      - name: Build distributable artifacts
        shell: bash
        run: |
          if [[ "${OPENBENCH_SIGNING_READY}" == "true" ]]; then
            pnpm exec electron-builder ${{ matrix.signed_package_args }}
          else
            pnpm exec electron-builder ${{ matrix.unsigned_package_args }}
          fi
      - name: Install Debian package
        if: runner.os == 'Linux'
        shell: bash
        run: sudo apt-get install --yes ./release/*.deb
      - name: Exercise installed Debian package and bundled Icarus
        if: runner.os == 'Linux'
        shell: bash
        env:
          OPENBENCH_TEST_PROJECT: ${{ github.workspace }}/examples/phase0
          OPENBENCH_TEST_ACTION: simulation
        run: |
          installed_app="$(command -v openbench || true)"
          if [[ -z "$installed_app" ]]; then
            installed_app="/opt/OpenBench/openbench"
          fi
          test -x "$installed_app"
          xvfb-run -a timeout 90s "$installed_app" --disable-gpu --no-sandbox
      - name: Verify installed Debian package waveform output
        if: runner.os == 'Linux'
        shell: bash
        run: find "${{ github.workspace }}/examples/phase0/.openbench-runs" -name '*.vcd' -type f -print -quit | grep -q .
      - name: Verify Windows release and scan with Defender
        if: runner.os == 'Windows'
        run: node scripts/verify-windows-release.cjs
      - name: Scan and checksum Linux release artifacts
        if: runner.os == 'Linux'
        run: node scripts/verify-linux-release.cjs
      - name: Verify and checksum macOS release artifacts
        if: runner.os == 'macOS'
        run: node scripts/verify-macos-release.cjs
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            app/release/*.deb
            app/release/*.exe
            app/release/*.tar.gz
            app/release/*.dmg
            app/release/*.zip
            app/release/SHA256SUMS.txt
            app/release/SHA256SUMS.txt.asc
