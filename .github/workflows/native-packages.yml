name: Native OpenBench packages

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  OSS_CAD_TAG: 2026-07-15

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            suite: windows-x64
            package_args: --win nsis --x64
            artifact: OpenBench-Windows-x64
          - os: ubuntu-22.04
            suite: linux-x64
            package_args: --linux AppImage tar.gz
            artifact: OpenBench-Linux-x64
          - os: macos-14
            suite: darwin-arm64
            package_args: --mac dmg zip --arm64
            artifact: OpenBench-macOS-arm64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - name: Download official native OSS CAD Suite
        shell: bash
        run: |
          archive_date="${OSS_CAD_TAG//-/}"
          archive="oss-cad-suite-${{ matrix.suite }}-${archive_date}.tgz"
          curl --fail --location --retry 3 "https://github.com/YosysHQ/oss-cad-suite-build/releases/download/${OSS_CAD_TAG}/${archive}" --output "${archive}"
          mkdir -p ../.toolchain
          tar -xzf "${archive}" -C ../.toolchain
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Stage bundled native backends
        env:
          OPENBENCH_TOOLCHAIN_SOURCE: ${{ github.workspace }}/.toolchain/oss-cad-suite
        run: pnpm toolchain:stage
      - name: Run native real-backend regression
        run: pnpm test
      - name: Build unpacked native app
        run: pnpm exec electron-builder ${{ matrix.package_args }} --dir
      - name: Exercise packaged Linux app and bundled Icarus
        if: runner.os == 'Linux'
        env:
          OPENBENCH_TEST_PROJECT: ${{ github.workspace }}/examples/phase0
          OPENBENCH_TEST_ACTION: simulation
        run: xvfb-run -a timeout 90s release/linux-unpacked/openbench --disable-gpu --no-sandbox
      - name: Verify packaged Linux waveform output
        if: runner.os == 'Linux'
        shell: bash
        run: find "${{ github.workspace }}/examples/phase0/.openbench-runs" -name '*.vcd' -type f -print -quit | grep -q .
      - name: Build distributable artifacts
        run: pnpm exec electron-builder ${{ matrix.package_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            app/release/*.AppImage
            app/release/*.exe
            app/release/*.tar.gz
            app/release/*.dmg
            app/release/*.zip
