name: Bug report
description: Report a reproducible OpenBench problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve OpenBench. Please remove private HDL before attaching a project.
  - type: input
    id: version
    attributes:
      label: OpenBench version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Windows, Linux, macOS, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Console output
      description: Paste both the plain-language explanation and raw tool output, if relevant.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add a minimal project or screenshot only if it is needed to reproduce the problem.

